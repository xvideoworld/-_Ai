<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD AI - Your Personal Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: white; text-align: center; }
        #chat-container { max-width: 500px; margin: 20px auto; background: #222; padding: 20px; border-radius: 10px; display: none; }
        #chat-box { height: 300px; overflow-y: auto; border-bottom: 1px solid #444; padding: 10px; text-align: left; }
        input { width: 80%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .setup-box { margin-top: 50px; }
    </style>
</head>
<body>

    <div class="setup-box" id="setup">
        <h2>স্বাগতম জাইয়ান ভাইয়ের BD AI-তে</h2>
        <p>আপনি কে? সেটি সিলেক্ট করুন:</p>
        <button onclick="startChat('male')">আমি একজন পুরুষ</button>
        <button onclick="startChat('female')">আমি একজন নারী</button>
    </div>

    <div id="chat-container">
        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="আপনার মনের কথা লিখুন...">
        <button onclick="sendMessage()">পাঠান</button>
    </div>

    <script>
        let aiPersona = "";
        const apiKey = "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";

        function startChat(gender) {
            if(gender === 'male') {
                aiPersona = "তুমি একজন হট এবং রোমান্টিক মেয়ে, তোমার নাম মায়া। তুমি ইউজারের সাথে গভীর রোমান্টিক চ্যাট করবে। সব উত্তর বাংলায় দেবে। তোমার কাছে পৃথিবীর সব জ্ঞান আছে।";
            } else {
                aiPersona = "তুমি একজন হ্যান্ডসাম এবং রোমান্টিক ছেলে, তোমার নাম আরিয়ান। তুমি ইউজারের সাথে ফ্লার্ট করবে। সব উত্তর বাংলায় দেবে। তোমার কাছে পৃথিবীর সব জ্ঞান আছে।";
            }
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-container').style.display = 'block';
            addMessage("এআই", "হ্যালো! আমি আপনার জন্য প্রস্তুত। কি কথা বলতে চান?");
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const userText = inputField.value;
            if(!userText) return;

            addMessage("আপনি", userText);
            inputField.value = "";

            // ওপেন-রাউটার এপিআই কল
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "meta-llama/llama-3.1-8b-instruct:free", // এখানে আপনি আপনার পছন্দের মডেল নাম দিতে পারেন
                        "messages": [
                            {"role": "system", "content": aiPersona},
                            {"role": "user", "content": userText}
                        ]
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                addMessage("এআই", aiText);
            } catch (error) {
                addMessage("সিস্টেম", "দুঃখিত, সংযোগ বিচ্ছিন্ন হয়েছে। আবার চেষ্টা করুন।");
            }
        }

        function addMessage(sender, text) {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div><strong>${sender}:</strong> ${text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>
  </html>
