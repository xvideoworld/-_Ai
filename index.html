<!DOCTYPE html>
<html>
<head>
    <title>🏃 Running Game - GTA Style</title>
    <style>
        body { margin: 0; background: #222; font-family: Arial; overflow: hidden; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            font-size: 24px; text-shadow: 2px 2px 4px #000; z-index: 100;
        }
        #stamina { 
            position: absolute; bottom: 20px; left: 20px; width: 300px; height: 30px;
            background: rgba(0,0,0,0.7); border: 2px solid #fff; z-index: 100;
        }
        #stamina-fill { 
            height: 100%; background: linear-gradient(90deg, #ff4444, #44ff44);
            width: 100%; transition: width 0.3s; 
        }
        #instructions {
            position: absolute; bottom: 20px; right: 20px; color: #ccc;
            font-size: 16px; text-align: right; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Speed: <span id="speed">0</span> km/h</div>
        <div>Score: <span id="score">0</span></div>
    </div>
    <div id="stamina">
        <div id="stamina-fill"></div>
    </div>
    <div id="instructions">
        WASD: Move | SHIFT: Run | SPACE: Jump<br>
        ESC: Pause | R: Reset
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // === 3D RUNNING GAME ENGINE ===
        let scene, camera, renderer, player, ground;
        let keys = {}, mouse = { x: 0, y: 0 };
        let velocity = { x: 0, z: 0, y: 0 };
        let stamina = 100, score = 0, isGrounded = true;
        let gamePaused = false;
        
        // Init
        init();
        animate();
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87CEEB, 50, 500);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // Player (Capsule)
            const playerGeo = new THREE.CapsuleGeometry(0.5, 2, 4, 8);
            const playerMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 2;
            player.castShadow = true;
            scene.add(player);
            
            // Ground
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // City Buildings
            for(let i=0; i<100; i++) {
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(5+Math.random()*10, 10+Math.random()*40, 5+Math.random()*10),
                    new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff })
                );
                building.position.set(
                    (Math.random()-0.5)*400, building.geometry.parameters.height/2,
                    (Math.random()-0.5)*400
                );
                building.castShadow = true;
                scene.add(building);
            }
            
            // Lights
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);
            
            // Events
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onResize);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if(!gamePaused) updateGame();
            renderer.render(scene, camera);
        }
        
        function updateGame() {
            // Input
            const speed = keys['ShiftLeft'] ? 0.3 : 0.15;
            const forward = keys['KeyW'] ? 1 : 0;
            const backward = keys['KeyS'] ? -1 : 0;
            const left = keys['KeyA'] ? -1 : 0;
            const right = keys['KeyD'] ? 1 : 0;
            
            // Movement
            const moveX = (left + right) * speed;
            const moveZ = (forward + backward) * speed;
            
            velocity.x += (moveX - velocity.x) * 0.1;
            velocity.z += (moveZ - velocity.z) * 0.1;
            
            // Jump
            if(keys['Space'] && isGrounded) {
                velocity.y = 0.25;
                isGrounded = false;
            }
            
            // Gravity
            velocity.y -= 0.015;
            player.position.x += velocity.x;
            player.position.z += velocity.z;
            player.position.y += velocity.y;
            
            // Ground collision
            if(player.position.y <= 1) {
                player.position.y = 1;
                velocity.y = 0;
                isGrounded = true;
            }
            
            // Stamina
            if(keys['ShiftLeft'] && stamina > 0) {
                stamina -= 0.5;
            } else {
                stamina = Math.min(100, stamina + 0.3);
            }
            
            // Camera follow
            const idealOffset = new THREE.Vector3(0, 8, 15);
            const camTarget = player.position.clone();
            camTarget.y += 2;
            camera.lookAt(camTarget);
            
            // Score
            score += Math.floor(Math.sqrt(Math.abs(velocity.x)+Math.abs(velocity.z))*10);
            
            // UI Update
            document.getElementById('speed').textContent = Math.floor(Math.sqrt(velocity.x*velocity.x + velocity.z*velocity.z)*100);
            document.getElementById('score').textContent = score;
            document.getElementById('stamina-fill').style.width = stamina + '%';
            
            // Reset
            if(keys['KeyR']) resetGame();
        }
        
        function onKeyDown(e) { keys[e.code] = true; }
        function onKeyUp(e) { keys[e.code] = false; }
        function onMouseMove(e) { 
            if(document.pointerLockElement === renderer.domElement) {
                player.rotation.y -= e.movementX * 0.002;
            }
        }
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function resetGame() {
            player.position.set(0,1,0);
            velocity = {x:0,y:0,z:0};
            stamina = 100;
            score = 0;
        }
        
        // Pointer Lock
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('keydown', (e) => {
            if(e.code === 'Escape') {
                document.exitPointerLock();
            }
        });
    </script>
</body>
    </html>
