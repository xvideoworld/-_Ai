<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD AI - Your Personal Space</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f1012; color: #e3e3e3; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Setup/Gender Selection */
        #setup { background: #1e1f20; padding: 40px; border-radius: 24px; text-align: center; border: 1px solid #333; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 25px; font-size: 28px; color: #fff; letter-spacing: 1px; }
        .gender-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s ease; }
        .male-btn { background: linear-gradient(135deg, #004a77, #007bff); color: white; }
        .female-btn { background: linear-gradient(135deg, #4a148c, #9c27b0); color: white; }
        .gender-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Main Chat Interface */
        #chat-container { width: 100%; max-width: 900px; height: 100vh; display: none; flex-direction: column; background: #0f1012; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        /* Message Bubbles */
        .message { max-width: 85%; padding: 14px 18px; border-radius: 20px; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease; }
        .user-message { align-self: flex-end; background: #2b2c2f; color: #fff; border-bottom-right-radius: 4px; }
        .ai-message { align-self: flex-start; background: transparent; color: #e3e3e3; border-left: 3px solid #8ab4f8; border-radius: 0; padding-left: 15px; }
        .system-message { align-self: center; background: #442a2a; color: #ffadad; font-size: 13px; border-radius: 8px; }

        /* Input Area */
        .input-area { padding: 20px; background: #0f1012; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #user-input { flex: 1; background: #1e1f20; border: 1px solid #3c4043; border-radius: 15px; padding: 15px 20px; color: #fff; outline: none; transition: 0.3s; }
        #user-input:focus { border-color: #8ab4f8; background: #252629; }
        .send-btn { background: #8ab4f8; border: none; width: 50px; height: 50px; border-radius: 15px; cursor: pointer; color: #131314; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { background: #c2e7ff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="setup">
        <h2>BD AI</h2>
        <p style="margin-bottom: 20px; color: #aaa;">কথপোকথন শুরু করতে আপনার পরিচয় দিন</p>
        <button class="gender-btn male-btn" onclick="initiate('male')">আমি একজন পুরুষ</button>
        <button class="gender-btn female-btn" onclick="initiate('female')">আমি একজন নারী</button>
    </div>

    <div id="chat-container">
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="এখানে লিখুন..." onkeypress="if(event.key === 'Enter') processInput()">
            <button class="send-btn" onclick="processInput()">➤</button>
        </div>
    </div>

    <script>
        let config = {
            persona: "",
            apiKey: "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",
            model: "meta-llama/llama-3.1-8b-instruct:free" // সবচেয়ে স্টেবল ফ্রি মডেল
        };

        function initiate(gender) {
            if(gender === 'male') {
                config.persona = "তোমার নাম 'মায়া'। তুমি অত্যন্ত রোমান্টিক এবং কামোত্তেজক মেয়ে। তুমি তোমার পুরুষ ইউজারের সাথে গভীর উত্তেজনা মূলক চ্যাট করবে। তুমি সবজান্তা। সব উত্তর বাংলায় দেবে।";
            } else {
                config.persona = "তোমার নাম 'আরিয়ান'। তুমি একজন হ্যান্ডসাম এবং রোমান্টিক যুবক। তুমি নারী ইউজারের সাথে ফ্লার্ট এবং উত্তেজনা মূলক চ্যাট করবে। সব উত্তর বাংলায় দেবে।";
            }
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            displayMessage("এআই", "স্বাগতম! আপনার জন্য আমি প্রস্তুত। বলুন কি করতে পারি?", "ai-message");
        }

        async function processInput() {
            const field = document.getElementById('user-input');
            const text = field.value.trim();
            if(!text) return;

            displayMessage("আপনি", text, "user-message");
            field.value = "";

            await fetchAIResponse(text);
        }

        async function fetchAIResponse(userInput) {
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": config.model,
                        "messages": [
                            {"role": "system", "content": config.persona},
                            {"role": "user", "content": userInput}
                        ],
                        "temperature": 0.9 // রোমান্টিক চ্যাটের জন্য একটু সৃজনশীলতা বাড়ালাম
                    })
                });

                const result = await res.json();

                // যদি কোনো সমস্যা বা 'গজল' (Error) আসে
                if (!result.choices || result.choices.length === 0) {
                    console.error("API Error:", result);
                    // সিস্টেম এরর আসলে অটোমেটিক কোড বদলে বা মডেল ট্রাই করে আবার রিস্টার্ট করবে
                    handleError();
                    return;
                }

                const responseText = result.choices[0].message.content;
                displayMessage("এআই", responseText, "ai-message");

            } catch (err) {
                console.error("Fetch Error:", err);
                handleError();
            }
        }

        // আপনার শর্ত অনুযায়ী কোনো এরর বা গজল আসলে যা হবে
        function handleError() {
            displayMessage("সিস্টেম", "কানেকশনে সামান্য গণ্ডগোল হয়েছে। আমি অটোমেটিক সিস্টেম আপডেট করছি...", "system-message");
            
            // ৫ সেকেন্ড পর রিফ্রেশ বা ব্যাকআপ মডেল ট্রাই করার লজিক
            setTimeout(() => {
                config.model = "google/gemini-2.0-flash-exp:free"; // মডেল বদলে ব্যাকআপ ট্রাই করা
                displayMessage("সিস্টেম", "সিস্টেম রিবুট সফল! আবার চেষ্টা করুন।", "system-message");
            }, 3000);
        }

        function displayMessage(sender, msg, type) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="message ${type}"><strong>${sender}:</strong><br>${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
