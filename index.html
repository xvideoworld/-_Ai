<!DOCTYPE html>
<html>
<head>
    <title>🏃‍♂️ Running Game (Button Control)</title>
    <style>
        body { margin:0; overflow:hidden; background:#87CEEB; }
        canvas { display:block; }

        #ui {
            position:fixed; top:20px; left:20px; color:#fff;
            font-size:20px; background:rgba(0,0,0,0.5);
            padding:10px; border-radius:10px;
        }

        #controls {
            position:fixed; top:20px; right:20px;
            z-index:2000;
        }

        button {
            padding:10px 15px;
            margin:5px;
            font-size:16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        #stamina {
            position:fixed; bottom:20px; left:20px;
            width:300px; height:25px;
            background:#000; border-radius:10px;
        }

        #stamina-fill {
            height:100%;
            background:linear-gradient(90deg, red, yellow, green);
            width:100%;
        }
    </style>
</head>
<body>

<div id="ui">
    Speed: <span id="speed">0</span><br>
    Score: <span id="score">0</span>
</div>

<div id="controls">
    <button onclick="startRun()">▶️ Run</button>
    <button onclick="stopRun()">⏸ Stop</button>
    <button onclick="freeMove()">🎮 Free Move</button>
</div>

<div id="stamina">
    <div id="stamina-fill"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, player;
let keys = {};
let mode = "stop";

let game = {
    velocity:{x:0,y:0,z:0},
    stamina:100,
    score:0,
    grounded:true,
    yaw:0,
    pitch:0,
    speed:0
};

init();
loop();

function init(){
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
    camera.position.set(0,5,10);

    renderer = new THREE.WebGLRenderer();
    renderer.setSize(innerWidth,innerHeight);
    document.body.appendChild(renderer.domElement);

    // Player
    player = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshBasicMaterial({color:0xff0000})
    );
    player.position.y = 1;
    scene.add(player);

    // Ground
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1000,1000),
        new THREE.MeshBasicMaterial({color:0x00aa00})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    document.addEventListener('keydown',e=>keys[e.code]=true);
    document.addEventListener('keyup',e=>keys[e.code]=false);
    document.addEventListener('mousemove',onMouse);

    window.addEventListener('resize',()=>{
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth,innerHeight);
    });
}

// 🎮 BUTTON FUNCTIONS
function startRun(){ mode="run"; }
function stopRun(){ mode="stop"; }
function freeMove(){ mode="free"; }

function loop(){
    requestAnimationFrame(loop);
    update();
    render();
}

function update(){

    let forward = 0;
    let right = 0;

    if(mode==="run"){
        forward = 1;
    }
    else if(mode==="free"){
        forward = (keys['KeyW']||0) - (keys['KeyS']||0);
        right = (keys['KeyD']||0) - (keys['KeyA']||0);
    }

    const speed = 0.2;

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y=0;
    dir.normalize();

    const rightDir = new THREE.Vector3(dir.z,0,-dir.x);

    game.velocity.x += (dir.x*forward + rightDir.x*right)*speed;
    game.velocity.z += (dir.z*forward + rightDir.z*right)*speed;

    player.position.x += game.velocity.x;
    player.position.z += game.velocity.z;

    game.velocity.x *= 0.8;
    game.velocity.z *= 0.8;

    // Jump
    if(keys['Space'] && game.grounded){
        game.velocity.y = 0.3;
        game.grounded=false;
    }

    game.velocity.y -= 0.02;
    player.position.y += game.velocity.y;

    if(player.position.y <= 1){
        player.position.y=1;
        game.velocity.y=0;
        game.grounded=true;
    }

    game.speed = Math.abs(game.velocity.x)+Math.abs(game.velocity.z);
    game.score += Math.floor(game.speed*10);

    document.getElementById('speed').innerText = Math.floor(game.speed*100);
    document.getElementById('score').innerText = game.score;
    document.getElementById('stamina-fill').style.width = game.stamina+"%";
}

function render(){
    camera.position.lerp(
        player.position.clone().add(new THREE.Vector3(0,5,10)),0.1
    );
    camera.lookAt(player.position);

    renderer.render(scene,camera);
}

function onMouse(e){
    game.yaw -= e.movementX*0.002;
    game.pitch -= e.movementY*0.002;

    camera.rotation.order="YXZ";
    camera.rotation.y = game.yaw;
    camera.rotation.x = game.pitch;
}
</script>

</body>
</html>
