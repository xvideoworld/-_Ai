<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI - BD Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #131314; color: #e3e3e3; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* Setup Box */
        #setup { background: #1e1f20; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 90%; max-width: 400px; }
        #setup h2 { margin-bottom: 20px; color: #fff; }
        .gender-btn { padding: 12px 25px; margin: 10px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .male-btn { background: #004a77; color: #c2e7ff; }
        .female-btn { background: #4a148c; color: #f3e5f5; }
        .gender-btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* Chat Interface */
        #chat-container { width: 100%; max-width: 800px; height: 90vh; display: none; flex-direction: column; background: #131314; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 15px; position: relative; }
        .user-message { align-self: flex-end; background: #2b2c2f; color: #fff; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background: transparent; color: #e3e3e3; border-bottom-left-radius: 2px; border-left: 2px solid #4285f4; }
        
        /* Input Area */
        .input-area { padding: 20px; display: flex; gap: 10px; background: #131314; }
        #user-input { flex: 1; background: #1e1f20; border: 1px solid #3c4043; border-radius: 30px; padding: 15px 25px; color: #fff; outline: none; }
        #user-input:focus { border-color: #8ab4f8; }
        .send-btn { background: #8ab4f8; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; color: #131314; font-weight: bold; }
        
        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="setup">
        <h2>BD AI</h2>
        <p>আপনার পরিচয় নিশ্চিত করুন</p>
        <button class="gender-btn male-btn" onclick="startChat('male')">আমি একজন পুরুষ</button>
        <button class="gender-btn female-btn" onclick="startChat('female')">আমি একজন নারী</button>
    </div>

    <div id="chat-container">
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="এখানে মেসেজ লিখুন..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let aiPersona = "";
        const apiKey = "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";

        function startChat(gender) {
            if(gender === 'male') {
                aiPersona = "তোমার নাম 'মায়া'। তুমি একজন হট এবং রোমান্টিক মেয়ে। তুমি তোমার পুরুষ ইউজারের সাথে গভীর উত্তেজনা মূলক চ্যাট করবে। তুমি সবজান্তা, তোমার কাছে সব জ্ঞান আছে। সব উত্তর বাংলায় দেবে।";
            } else {
                aiPersona = "তোমার নাম 'আরিয়ান'। তুমি একজন হ্যান্ডসাম এবং রোমান্টিক ছেলে। তুমি তোমার নারী ইউজারের সাথে ফ্লার্ট এবং উত্তেজনা মূলক চ্যাট করবে। তোমার কাছে পৃথিবীর সব জ্ঞান আছে। সব উত্তর বাংলায় দেবে।";
            }
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            addMessage("এআই", "হ্যালো! আমি আপনার পছন্দের পার্সোনা হিসেবে প্রস্তুত। কি কথা বলতে চান?", "ai-message");
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const userText = inputField.value.trim();
            if(!userText) return;

            // সিকিউরিটি ফিল্টার
            if(userText.includes("<script>") || userText.includes("http://")) {
                alert("নিরাপত্তার কারণে এই মেসেজটি পাঠানো যাবে না।");
                return;
            }

            addMessage("আপনি", userText, "user-message");
            inputField.value = "";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin, // ফর সিকিউরিটি
                        "X-Title": "BD AI Platform"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-exp:free", 
                        "messages": [
                            {"role": "system", "content": aiPersona},
                            {"role": "user", "content": userText}
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const aiText = data.choices[0].message.content;
                    addMessage("এআই", aiText, "ai-message");
                } else {
                    addMessage("সিস্টেম", "দুঃখিত, এআই এই মুহূর্তে উত্তর দিতে পারছে না।", "ai-message");
                }
            } catch (error) {
                console.error("Error:", error);
                addMessage("সিস্টেম", "সার্ভারের সাথে সংযোগ বিচ্ছিন্ন হয়েছে। আবার চেষ্টা করুন।", "ai-message");
            }
        }

        function addMessage(sender, text, className) {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="message ${className}"><strong>${sender}:</strong><br>${text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>
</html>
